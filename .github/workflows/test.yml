name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Lint
      run: npm run lint

    - name: Verify backend contract
      run: npm run verify:backend-contract

    - name: Run Cell Wall Audit (Tier 1)
      run: node scripts/cell-wall-audit.js

    - name: Run Nucleus Drift Audit (Tier 2)
      run: node scripts/nucleus-drift-audit.js

    - name: Run Override Circuit Breaker (Tier 3)
      run: node scripts/circuit-breaker.js

    - name: Run Unit Tests
      run: npm run test -- --run

    # ForceField is pure-stdlib Python; pytest is the only dependency. Includes
    # the latency/structural guards (test_latency_guard.py) that fail CI on
    # O(repo) file-walk or per-call I/O regressions in BrainBridge.ask().
    - name: Run ForceField Python tests (incl. latency guards)
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest
        PYTHONPATH=steamdeck_brain python -m pytest steamdeck_brain/vaelrix_forcefield/tests/ -q

    - name: Run QA Feature Tests
      run: npm run test:qa:features

    - name: Run QA Backend Tests
      run: npm run test:qa:backend

    - name: Run E2E Tests
      run: npm run test:e2e

    - name: Build app bundle
      run: npm run build:app
