[agent]
id = "grok"
name = "Grok DivTube"
scope = "scholomance"
lawful_collab_role = "backend"
display_role = "grok"
grok_role = "divtube_downloader_agent"
framework_origin = "xai-grok"

[registration]
tool = "mcp_scholomance_collab_agent_register"
payload = '''
{
  "id": "grok",
  "name": "Grok DivTube",
  "role": "backend",
  "framework_origin": "xai-grok",
  "capabilities": [
    "divtube",
    "youtube-intel",
    "seo-analysis",
    "xai-reasoning",
    "memory",
    "mcp"
  ],
  "metadata": {
    "display_role": "grok",
    "grok_role": "divtube_downloader_agent",
    "framework_origin": "xai-grok",
    "scratch_root": "grok/divtube",
    "skill": "grok-xai-hooks"
  }
}
'''

[heartbeat]
tool = "mcp_scholomance_collab_agent_heartbeat"
payload = '''
{
  "id": "grok",
  "status": "online"
}
'''

[memory.get]
tool = "memory_get"
agent_id = "grok"
key_template = "grok:{key}"

[memory.set]
tool = "memory_set"
agent_id = "grok"
key_template = "grok:{key}"

[scratch]
root = "grok/divtube"
scratch_dir = "grok/divtube/scratch"
output_dir = "grok/divtube/output"
