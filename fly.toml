app = "scholomance-v13"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"
  TRUST_PROXY = "true"
  ENABLE_COLLAB_API = "true"
  SCHOLOMANCE_DICT_PATH = "/var/data/scholomance_dict.sqlite"
  SCHOLOMANCE_CORPUS_PATH = "/var/data/scholomance_corpus.sqlite"
  RHYME_ASTROLOGY_OUTPUT_DIR = "/var/data/rhyme-astrology"
  ENABLE_TURBOQUANT = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health/live"
    timeout = "10s"
    type = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "scholomance_scratch"
  destination = "/var/data"
