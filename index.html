<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#040409" />
    <meta name="description" content="Scholomance — an arcane interface for rhythm, rhyme, and phoneme alchemy." />

    <!-- Typography (clean UI + ritual mono + display + scroll serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Crimson Pro (reading/scroll serif) is self-hosted — see @font-face in src/index.css. -->
    <!--
      Fonts load via preload + plain stylesheet. Do NOT reintroduce the
      `media="print" onload="this.media='all'"` async-CSS trick: `onload=` is an
      inline event handler, and our CSP sets script-src-attr 'none' (Helmet's
      default, see codex/server/index.js). The browser BLOCKS the handler, the
      media attribute never flips from "print" to "all", and the fonts then apply
      only when printing the page — silently, with nothing but a console warning.

      Non-blocking behaviour is preserved by `display=swap` on every URL below:
      text paints immediately in the fallback face and swaps when the webfont
      arrives. The preload warms the fetch; the stylesheet reuses that response.
    -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cinzel:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cinzel:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />

    <!-- Grimoire Landing — blackletter + historical serif -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English+SC:ital@0;1&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English+SC:ital@0;1&display=swap" />

    <title>Scholomance — Sonic Thaumaturgy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
