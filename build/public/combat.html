<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCHOLOMANCE — VOID Arena (Free Roam)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: monospace; }
    
    /* Godot arena canvas - full screen immersive world view (the "most of the screen") */
    #godot-arena {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      image-rendering: pixelated; /* Keep PixelBrain crisp */
    }
    
    /* Phaser HUD overlay - transparent, on top for MMORPG chrome */
    #phaser-hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: auto; /* HUD can capture clicks */
    }
    
    /* Optional: thin debug border so you see the layering */
    #godot-arena { border: 2px solid rgba(168, 168, 184, 0.1); }
  </style>

<!-- Load Phaser 4 (latest version requested by user) -->
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>

</head>
<body>
  <!-- Phaser draws the full game (Arena + HUD) -->
  <canvas id="phaser-game"></canvas>

  <script type="module">
    // === WIRING PHASER AS THE SOLE ENGINE ===
    // We've ditched Godot. Phaser now handles both the world (CombatArenaScene) and UI (CombatHUDScene).
    
    import CombatArenaScene from '/src/phaser/CombatArenaScene.js';
    import CombatHUDScene from '/src/phaser/CombatHUDScene.js';

    const PHASER_CANVAS_ID = 'phaser-game';

    function initPhaserGame() {
      const canvas = document.getElementById(PHASER_CANVAS_ID);
      
      const config = {
        type: Phaser.CANVAS,
        canvas: canvas,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: '#0a0a12',
        pixelArt: true,              // Essential: nearest-neighbor scaling for PixelBrain assets
        antialias: false,
        scene: [CombatArenaScene, CombatHUDScene],
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH
        }
      };

      const game = new Phaser.Game(config);

      // Handle resize so the game stays correctly sized
      window.addEventListener('resize', () => {
        game.scale.resize(window.innerWidth, window.innerHeight);
      });

      // Expose for debugging
      window.__PHASER_GAME__ = game;
    }

    // === BOOT ===
    function boot() {
      initPhaserGame();
      console.log('%c[VOID Arena] Pure Phaser Engine initialized. Godot removed.', 'color:#6B35B8');
    }

    // Auto-start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
